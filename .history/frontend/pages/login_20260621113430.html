<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Expense Splitter</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">

      <div class="brand-mark">
        <div class="glyph">₹</div>
        <h1>Expense Splitter</h1>
        <p>Split fairly. Settle simply.</p>
      </div>

      <div class="auth-heading">
        <h2>Welcome back</h2>
        <p>Login to your ledger</p>
      </div>

      <div class="alert alert-error" id="errorMsg"></div>
      <div class="alert alert-success" id="successMsg"></div>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      
      <button class="btn" id="loginBtn" onclick="login()">Login</button>

      <div class="auth-switch">
        Don't have an account? <a href="register.html">Create one</a>
      </div>

    </div>
  </div>

  <script src="../js/auth.js"></script>
</body>
</html>
