<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Expense Splitter</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="app-body">

  <nav class="topbar">
    <a href="dashboard.html" class="topbar-brand">
      <span class="glyph-sm">₹</span>
      <span>Expense Splitter</span>
    </a>
    <div class="topbar-right">
      <div class="user-chip">
        <span class="avatar" id="userAvatar"></span>
        <span id="userName">Loading...</span>
      </div>
      <button class="logout-link" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="shell">
    <div class="shell-header">
      <div>
        <span class="eyebrow">Your ledger</span>
        <h2>My Groups</h2>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-small" onclick="openModal('joinModal')">
          Join with code
        </button>
        <button class="btn btn-small" onclick="openModal('createModal')">
          + Create Group
        </button>
      </div>
    </div>

    <div id="groupsContainer">
      <div class="groups-grid">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </div>
  </div>

  <!-- Create Group Modal -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <h3>Create new group</h3>
      <div class="alert alert-error" id="createError"></div>
      <div class="field">
        <label>Group Name</label>
        <input type="text" id="groupName" placeholder="e.g. Goa Trip 2024" />
      </div>
      <div class="field">
        <label>Description (optional)</label>
        <input type="text" id="groupDesc" placeholder="e.g. Trip expenses" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('createModal')">Cancel</button>
        <button class="btn" id="createGroupBtn" onclick="createGroup()">Create</button>
      </div>
    </div>
  </div>

  <!-- Join Group Modal -->
  <div class="modal-overlay" id="joinModal">
    <div class="modal">
      <h3>Join a group</h3>
      <div class="alert alert-error" id="joinError"></div>
      <div class="field">
        <label>Invite Code</label>
        <input type="text" id="inviteCode" placeholder="e.g. GRP-NICX4" style="text-transform:uppercase" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('joinModal')">Cancel</button>
        <button class="btn" id="joinGroupBtn" onclick="joinGroup()">Join</button>
      </div>
    </div>
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <script src="../js/dashboard.js"></script>
</body>
</html>
