<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group — Expense Splitter</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="app-body">

  <nav class="topbar">
    <a href="dashboard.html" class="topbar-brand">
      <span class="glyph-sm">₹</span>
      <span>Expense Splitter</span>
    </a>
    <div class="topbar-right">
      <div class="user-chip">
        <span class="avatar" id="userAvatar"></span>
        <span id="userName"></span>
      </div>
      <button class="logout-link" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="shell">

    <div id="groupHeader">
      <div class="skeleton" style="height:40px; width:240px; margin-bottom:10px;"></div>
      <div class="skeleton" style="height:18px; width:160px;"></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('expenses', event)">Expenses</button>
      <button class="tab" onclick="switchTab('balances', event)">Balances</button>
      <button class="tab" onclick="switchTab('activity', event)">Activity</button>
    </div>

    <!-- Expenses Tab -->
    <div id="expensesTab">
      <div class="shell-header" style="margin-bottom:18px">
        <h2 style="font-size:20px">Expenses</h2>
        <button class="btn btn-small" onclick="openModal('addExpenseModal')">+ Add Expense</button>
      </div>
      <div id="expensesContainer">
        <div class="skeleton skeleton-row"></div>
        <div class="skeleton skeleton-row"></div>
      </div>
    </div>

    <!-- Balances Tab -->
    <div id="balancesTab" style="display:none">
      <div class="balance-panel">
        <h3>Who owes what</h3>
        <div id="balancesContainer">
          <div class="skeleton" style="height:40px;"></div>
        </div>
      </div>
      <div class="balance-panel">
        <h3>Minimum settlements needed</h3>
        <div id="settlementsContainer"></div>
      </div>
    </div>

    <!-- Activity Tab -->
    <div id="activityTab" style="display:none">
      <div class="balance-panel">
        <h3>Recent activity</h3>
        <div id="activityContainer">
          <div class="skeleton" style="height:40px;"></div>
        </div>
      </div>
    </div>

  </div>

<!-- Add Expense Modal -->
<!-- Add Expense Modal -->
<div class="modal-overlay" id="addExpenseModal">
  <div class="modal">
    <h3>Add expense</h3>
    <div class="alert alert-error" id="expenseError"></div>

    <div class="field">
      <label>Description</label>
      <input type="text" id="expenseDesc" placeholder="e.g. Dinner at restaurant" />
    </div>

    <div class="field">
      <label>Amount (₹)</label>
      <input type="number" id="expenseAmount" placeholder="e.g. 1200" />
    </div>

    <div class="field">
      <label>Category</label>
      <select id="expenseCategory">
        <option value="food">Food</option>
        <option value="travel">Travel</option>
        <option value="accommodation">Accommodation</option>
        <option value="utilities">Utilities</option>
        <option value="entertainment">Entertainment</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="field">
      <label>Split Type</label>
      <select id="splitType" onchange="handleSplitTypeChange()">
        <option value="equal">Equal — split equally among all members</option>
        <option value="exact">Exact — enter amount per person</option>
        <option value="percentage">Percentage — enter % per person</option>
      </select>
    </div>

    <div id="customSplitSection" style="display:none">
      <div style="background:var(--cream-deep); border-radius:12px; padding:16px; margin-bottom:18px;">
        <p style="font-size:13px; color:var(--ink-soft); margin-bottom:12px;" id="splitInstructions"></p>
        <div id="customSplitFields"></div>
        <p style="font-size:12px; color:var(--coral); margin-top:8px;" id="splitTotal"></p>
      </div>
    </div>

    <div class="field">
      <label>Notes (optional)</label>
      <input type="text" id="expenseNotes" placeholder="Any additional notes" />
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('addExpenseModal')">Cancel</button>
      <button class="btn" id="addExpenseBtn" onclick="addExpense()">Add</button>
    </div>

  </div>
</div>

  <div class="toast-stack" id="toastStack"></div>

  <script src="../js/group.js"></script>
</body>
</html>
