<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group — Expense Splitter</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-body">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <a href="dashboard.html" style="text-decoration:none; color:#1a73e8">
        ← Expense Splitter
      </a>
    </div>
    <div class="navbar-user">
      <span id="userName"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Group Header -->
    <div id="groupHeader" class="loading">Loading group...</div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('expenses')">
        Expenses
      </div>
      <div class="tab" onclick="switchTab('balances')">
        Balances
      </div>
    </div>

    <!-- Expenses Tab -->
    <div id="expensesTab">
      <div class="page-header">
        <h2>Expenses</h2>
        <button class="btn btn-create" onclick="openModal('addExpenseModal')">
          + Add Expense
        </button>
      </div>
      <div id="expensesContainer">
        <div class="loading">Loading expenses...</div>
      </div>
    </div>

    <!-- Balances Tab -->
    <div id="balancesTab" style="display:none">
      <div class="balance-card">
        <h3>Who owes what</h3>
        <div id="balancesContainer">
          <div class="loading">Loading balances...</div>
        </div>
      </div>
      <div class="balance-card">
        <h3>Minimum settlements needed</h3>
        <div id="settlementsContainer">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </div>

  </div>

  <!-- Add Expense Modal -->
  <div class="modal-overlay" id="addExpenseModal">
    <div class="modal">
      <h3>Add Expense</h3>
      <div class="error-msg" id="expenseError"></div>

      <div class="form-group">
        <label>Description</label>
        <input type="text" id="expenseDesc" placeholder="e.g. Dinner at restaurant"/>
      </div>

      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="expenseAmount" placeholder="e.g. 1200"/>
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="expenseCategory">
          <option value="food">Food</option>
          <option value="travel">Travel</option>
          <option value="accommodation">Accommodation</option>
          <option value="utilities">Utilities</option>
          <option value="entertainment">Entertainment</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Notes (optional)</label>
        <input type="text" id="expenseNotes" placeholder="Any additional notes"/>
      </div>

      <div class="modal-buttons">
        <button class="btn btn-secondary" onclick="closeModal('addExpenseModal')">
          Cancel
        </button>
        <button class="btn" onclick="addExpense()">Add</button>
      </div>
    </div>
  </div>

  <script src="../js/group.js"></script>
</body>
</html>
